version: '3.8'

services:
  php:
    image: php:8.1-fpm
    container_name: scriptdone_php
    volumes:
      - ./public:/var/www/html
    ports:
      - "9000:9000"

  nginx:
    image: nginx:latest
    container_name: scriptdone_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
